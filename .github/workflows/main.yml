name: Update SideStore Source

on:
  release:
    types: [published, created, edited]
  schedule:
    # 요청하신 대로 6시간마다 실행되도록 설정 (0, 6, 12, 18시)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # JSON 파일을 수정하고 커밋하기 위해 필수적인 권한입니다[cite: 8]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Script
        env:
          # YouTube API 호출 시 제한을 방지하기 위해 토큰을 환경 변수로 넘겨줍니다[cite: 8]
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_source.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git fetch origin
          git reset --hard origin/main
          
          git add "NightFox.json"
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync mirror and update minOSVersion [skip ci]"
            git push origin HEAD:main --force
          else
            echo "변경 사항 없음, 푸시 스킵"
          fi
