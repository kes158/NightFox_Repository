name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox.json' # 수정됨
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * *' # 매일 자정 자동 실행
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 1. 고정 리스트에서 IPA 자동 복제
      - name: Sync Multiple Upstreams
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_LIST: |
            diarrhea3/YTLiteDiarrhea
            # 추가할 저장소 주소를 이 아래에 줄바꿈으로 적으세요.
        run: |
          for UPSTREAM in $UPSTREAM_LIST; do
            [[ "$UPSTREAM" =~ ^#.* ]] && continue
            echo "[$UPSTREAM] 동기화 중..."
            gh release download --repo "$UPSTREAM" --pattern "*.ipa" --clobber || echo "$UPSTREAM 에서 파일을 찾지 못했습니다."
          done
          
          # 내 저장소의 'latest' 릴리즈에 업로드
          gh release create latest --title "Latest Synced Apps" --notes "Automatically synced" || true
          gh release upload latest *.ipa --clobber

      - name: Download Final IPAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name || 'latest' }}
        run: python update_source.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "NightFox.json" # 수정됨
          if [ -d "icons" ]; then git add icons/*.png; fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync and update NightFox.json [skip ci]"
            git push origin HEAD:main
          fi
