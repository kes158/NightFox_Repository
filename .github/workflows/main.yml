name: Update SideStore Source

on:
  release:
    types: [published, created, edited]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      use_spotify_mirror:
        description: 'Spotify 미러 소스 동기화'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Sync main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch origin main
          git checkout main
          git pull origin main --ff-only

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # workflow_dispatch에서 체크박스를 직접 체크했을 때만 true
          USE_SPOTIFY_MIRROR: ${{ github.event_name == 'workflow_dispatch' && inputs.use_spotify_mirror == true }}
        run: python update_source.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "NightFox.json"
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync mirror and update minOSVersion [skip ci]"
            git push origin HEAD:main
          else
            echo "변경 사항 없음, 푸시 스킵"
          fi
