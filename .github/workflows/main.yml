name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox.json' # 수동 수정 시에도 감지
  release:
    types: [published]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 1. 타 저장소에서 IPA와 릴리즈 정보 복제
      - name: Sync Multiple Upstreams
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_LIST: |
            diarrhea3/YTLiteDiarrhea
            jaydenjcpy/EeveeSpotifyRevivedPublic
        run: |
          for UPSTREAM in $UPSTREAM_LIST; do
            [[ "$UPSTREAM" =~ ^#.* ]] && continue
            echo "[$UPSTREAM] 동기화 중..."

            # 릴리즈 정보 가져오기
            REL_TITLE=$(gh release view --repo "$UPSTREAM" --json name --jq '.name')
            REL_BODY=$(gh release view --repo "$UPSTREAM" --json body --jq '.body')
            
            # IPA 다운로드
            gh release download --repo "$UPSTREAM" --pattern "*.ipa" --clobber
            
            # 내 저장소 릴리즈 업데이트
            if gh release view latest > /dev/null 2>&1; then
              gh release edit latest --title "$REL_TITLE" --notes "$REL_BODY"
            else
              gh release create latest --title "$REL_TITLE" --notes "$REL_BODY"
            fi
            gh release upload latest *.ipa --clobber
          done

      - name: Download Final IPAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      # 2. Python 실행 (update_source.py가 NightFox.json을 생성함)
      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name || 'latest' }}
        run: python update_source.py

      # 3. 변경된 NightFox.json을 저장소에 푸시
      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # [핵심] 파일명을 정확히 NightFox.json으로 지정
          git add "NightFox.json"
          if [ -d "icons" ]; then git add icons/*.png; fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: update NightFox.json with identifier [skip ci]"
            git push origin HEAD:main
          fi
