name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox.json' # 수동 수정 시에도 감지
  release:
    types: [published]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

# 1. 타 저장소에서 가장 최근에 생성된 릴리즈 복제
      - name: Sync Multiple Upstreams
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_LIST: |
            diarrhea3/YTLiteDiarrhea
            
        run: |
          for UPSTREAM in $UPSTREAM_LIST; do
            [[ "$UPSTREAM" =~ ^#.* ]] && continue
            echo "[$UPSTREAM] 최신 릴리즈 확인 중..."

            # [정당화] --limit 1을 사용하여 날짜 기준 가장 최근 릴리즈의 태그명을 가져옴
            LATEST_TAG=$(gh release list --repo "$UPSTREAM" --limit 1 --json tagName --jq '.[0].tagName')
            
            if [ -z "$LATEST_TAG" ]; then
              echo "릴리즈를 찾을 수 없습니다."
              continue
            fi
            
            echo "발견된 최신 태그: $LATEST_TAG"

            # 해당 태그의 정보 가져오기
            REL_TITLE=$(gh release view "$LATEST_TAG" --repo "$UPSTREAM" --json name --jq '.name')
            REL_BODY=$(gh release view "$LATEST_TAG" --repo "$UPSTREAM" --json body --jq '.body')
            
            # 해당 태그의 IPA 다운로드
            gh release download "$LATEST_TAG" --repo "$UPSTREAM" --pattern "*.ipa" --clobber
            
            # 내 저장소 릴리즈 업데이트 (내 저장소는 여전히 'latest' 태그를 창고로 사용)
            if gh release view latest > /dev/null 2>&1; then
              gh release edit latest --title "$REL_TITLE" --notes "$REL_BODY"
            else
              gh release create latest --title "$REL_TITLE" --notes "$REL_BODY"
            fi
            
            # 내 저장소에 업로드
            gh release upload latest *.ipa --clobber
          done

      - name: Download Final IPAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests # requests 추가 설치
          
      # 2. Python 실행 (update_source.py가 NightFox.json을 생성함)
      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name || 'latest' }}
        run: python update_source.py

# 3. 변경된 NightFox.json을 저장소에 푸시
      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # [수정] 파이썬 스크립트가 생성하는 파일 이름과 일치시킵니다.
          git add "NightFox.json"
          
          if [ -d "icons" ]; then git add icons/*.png; fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: update NightFox.json [skip ci]"
            git push origin HEAD:main
          fi
