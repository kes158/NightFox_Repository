name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox.json' # 수정됨
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * *' # 매일 자정 자동 실행
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 1. 고정 리스트에서 IPA 및 릴리즈 정보 자동 복제
      - name: Sync Multiple Upstreams
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_LIST: |
            diarrhea3/YTLiteDiarrhea
        run: |
          for UPSTREAM in $UPSTREAM_LIST; do
            [[ "$UPSTREAM" =~ ^#.* ]] && continue
            echo "[$UPSTREAM] 동기화 중..."

            # 원본의 최신 릴리즈 타이틀과 본문 가져오기
            REL_TITLE=$(gh release view --repo "$UPSTREAM" --json name --jq '.name')
            REL_BODY=$(gh release view --repo "$UPSTREAM" --json body --jq '.body')
            
            # IPA 다운로드
            gh release download --repo "$UPSTREAM" --pattern "*.ipa" --clobber
            
            # 내 저장소의 'latest' 릴리즈 업데이트 (원본 타이틀과 본문 이식)
            # 이미 있으면 수정(edit), 없으면 생성(create)
            if gh release view latest > /dev/null 2>&1; then
              gh release edit latest --title "$REL_TITLE" --notes "$REL_BODY"
            else
              gh release create latest --title "$REL_TITLE" --notes "$REL_BODY"
            fi
            
            # 파일 업로드
            gh release upload latest *.ipa --clobber
          done

      - name: Download Final IPAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name || 'latest' }}
        run: python update_source.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "NightFox.json" # 수정됨
          if [ -d "icons" ]; then git add icons/*.png; fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync and update NightFox.json [skip ci]"
            git push origin HEAD:main
          fi
