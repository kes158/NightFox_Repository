name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox.json'
  release:
    types: [published, created, edited]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 1. 내 저장소의 모든 릴리즈에서 IPA 다운로드
      - name: Download My Current IPAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "내 저장소의 IPA들을 가져오는 중..."
          gh release download --pattern "*.ipa" --clobber || echo "다운로드할 파일이 없습니다."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests

      # 2. Python 실행 (Spotify 동기화 및 버전 정렬 로직 포함)
      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_source.py

      # 3. 변경된 NightFox.json을 저장소에 푸시
      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "NightFox.json"
          if [ -d "icons" ]; then git add icons/*.png; fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync releases and update NightFox.json [skip ci]"
            git push origin HEAD:main
          fi
